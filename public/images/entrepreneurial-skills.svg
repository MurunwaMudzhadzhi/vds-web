<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="es-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf6ec"/>
      <stop offset="100%" stop-color="#cdeccf"/>
    </linearGradient>
    <linearGradient id="es-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8c9a3"/>
      <stop offset="100%" stop-color="#c1ac7c"/>
    </linearGradient>
    <linearGradient id="es-awning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a13b"/>
      <stop offset="100%" stop-color="#c2513f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#es-sky)"/>
  <circle cx="670" cy="100" r="60" fill="#fdd873" opacity="0.9"/>
  <rect x="0" y="440" width="800" height="160" fill="url(#es-ground)"/>

  <!-- market stall -->
  <g transform="translate(160,230)">
    <rect x="0" y="120" width="260" height="170" fill="#f4e3b2"/>
    <rect x="0" y="120" width="260" height="12" fill="#c9ab6e"/>
    <polygon points="-15,120 15,60 65,120" fill="url(#es-awning)"/>
    <polygon points="55,120 85,60 135,120" fill="url(#es-awning)"/>
    <polygon points="125,120 155,60 205,120" fill="url(#es-awning)"/>
    <polygon points="195,120 225,60 275,120" fill="url(#es-awning)"/>
    <rect x="10" y="35" width="10" height="30" fill="#7a5230"/>
    <rect x="240" y="35" width="10" height="30" fill="#7a5230"/>
    <rect x="30" y="170" width="200" height="90" fill="#7a5230"/>
    <rect x="40" y="180" width="180" height="70" fill="#8a6a45"/>
    <g fill="#3d8a35">
      <circle cx="65" cy="205" r="12"/>
      <circle cx="95" cy="212" r="12"/>
      <circle cx="125" cy="205" r="12"/>
    </g>
    <g fill="#e0546b">
      <circle cx="160" cy="210" r="11"/>
      <circle cx="185" cy="204" r="11"/>
    </g>
  </g>

  <!-- person at stall -->
  <g transform="translate(120,340)">
    <circle cx="0" cy="0" r="22" fill="#8a5a3c"/>
    <path d="M-22 0 a22 22 0 0 1 44 0 v-4 a22 20 0 0 0 -44 0 Z" fill="#2b2723"/>
    <path d="M-10 60 L-16 130 M10 60 L16 130" stroke="#2f3b4c" stroke-width="10" stroke-linecap="round"/>
    <rect x="-20" y="20" width="40" height="50" rx="10" fill="#3d8a35"/>
    <path d="M-20 30 L-38 55 M20 30 L38 55" stroke="#3d8a35" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- growth chart card -->
  <g transform="translate(500,330)">
    <rect x="0" y="0" width="220" height="150" rx="16" fill="#ffffff" opacity="0.92"/>
    <polyline points="20,110 70,80 110,95 150,55 195,30" fill="none" stroke="#2f6b2a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="180,20 200,20 200,40" fill="#2f6b2a"/>
    <circle cx="70" cy="80" r="6" fill="#e8a13b"/>
    <circle cx="150" cy="55" r="6" fill="#e8a13b"/>
    <g fill="#c9ab6e">
      <rect x="20" y="120" width="16" height="16" rx="3"/>
      <rect x="45" y="120" width="16" height="16" rx="3"/>
      <rect x="70" y="120" width="16" height="16" rx="3"/>
    </g>
  </g>

  <!-- coin stack -->
  <g transform="translate(400,500)">
    <ellipse cx="0" cy="0" rx="30" ry="10" fill="#e8a13b"/>
    <ellipse cx="0" cy="-10" rx="30" ry="10" fill="#fdd873"/>
    <ellipse cx="0" cy="-20" rx="30" ry="10" fill="#e8a13b"/>
    <ellipse cx="0" cy="-30" rx="30" ry="10" fill="#fdd873"/>
  </g>
</svg>
