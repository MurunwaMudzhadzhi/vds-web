<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf6ec"/>
      <stop offset="100%" stop-color="#cdeccf"/>
    </linearGradient>
    <linearGradient id="hc-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6a45"/>
      <stop offset="100%" stop-color="#6b4f31"/>
    </linearGradient>
    <linearGradient id="hc-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ecff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a9d6f5" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#hc-sky)"/>
  <circle cx="120" cy="100" r="60" fill="#fdd873" opacity="0.9"/>
  <rect x="0" y="420" width="800" height="180" fill="url(#hc-ground)"/>

  <!-- greenhouse -->
  <g transform="translate(430,260)">
    <polygon points="0,90 90,20 180,90" fill="#dceeff" stroke="#7fa8c9" stroke-width="4"/>
    <rect x="0" y="90" width="180" height="140" fill="url(#hc-glass)" stroke="#7fa8c9" stroke-width="4"/>
    <line x1="90" y1="20" x2="90" y2="230" stroke="#7fa8c9" stroke-width="4"/>
    <line x1="45" y1="55" x2="45" y2="230" stroke="#7fa8c9" stroke-width="3" opacity="0.7"/>
    <line x1="135" y1="55" x2="135" y2="230" stroke="#7fa8c9" stroke-width="3" opacity="0.7"/>
    <rect x="70" y="150" width="40" height="80" fill="#5a7d95"/>
  </g>

  <!-- raised garden beds -->
  <g transform="translate(60,430)">
    <rect x="0" y="0" width="180" height="90" rx="10" fill="#7a5230"/>
    <rect x="8" y="8" width="164" height="74" rx="6" fill="#4c3a24"/>
    <g fill="#3d8a35">
      <ellipse cx="35" cy="30" rx="22" ry="16"/>
      <ellipse cx="85" cy="24" rx="24" ry="17"/>
      <ellipse cx="135" cy="30" rx="22" ry="16"/>
    </g>
    <g fill="#e0546b">
      <circle cx="35" cy="18" r="6"/>
      <circle cx="85" cy="10" r="6"/>
      <circle cx="135" cy="18" r="6"/>
    </g>
  </g>

  <g transform="translate(280,455)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#7a5230"/>
    <rect x="8" y="8" width="124" height="64" rx="6" fill="#4c3a24"/>
    <g fill="#2f6b2a">
      <path d="M20 55 C 15 30, 15 15, 20 -5 C 25 15, 25 30, 20 55 Z"/>
      <path d="M55 55 C 50 25, 50 10, 55 -10 C 60 10, 60 25, 55 55 Z"/>
      <path d="M90 55 C 85 30, 85 15, 90 -5 C 95 15, 95 30, 90 55 Z"/>
      <path d="M120 55 C 115 28, 115 12, 120 -8 C 125 12, 125 28, 120 55 Z"/>
    </g>
  </g>

  <!-- watering can -->
  <g transform="translate(640,470)">
    <ellipse cx="0" cy="60" rx="45" ry="12" fill="#345c2a" opacity="0.2"/>
    <path d="M-40 20 h60 a10 10 0 0 1 10 10 v10 a14 14 0 0 1 -14 14 h-46 a14 14 0 0 1 -14 -14 v-6 a4 4 0 0 1 4 -4 Z" fill="#3d8a35"/>
    <rect x="-46" y="10" width="16" height="10" rx="3" fill="#3d8a35"/>
    <path d="M20 20 l45 -25 a6 6 0 0 1 9 6 l-4 22" fill="none" stroke="#3d8a35" stroke-width="8" stroke-linecap="round"/>
    <path d="M62 6 l14 -4 M64 12 l16 2 M60 18 l14 8" stroke="#3d8a35" stroke-width="4" stroke-linecap="round"/>
    <path d="M-10 -10 a10 16 0 1 1 20 0 v10 h-20 Z" fill="#3d8a35"/>
  </g>

  <!-- sunflowers -->
  <g transform="translate(200,340)">
    <line x1="0" y1="0" x2="0" y2="90" stroke="#3a6e2c" stroke-width="6"/>
    <circle cx="0" cy="-10" r="22" fill="#8a5a2a"/>
    <g fill="#fdd873">
      <ellipse cx="0" cy="-40" rx="8" ry="18"/>
      <ellipse cx="0" cy="20" rx="8" ry="18"/>
      <ellipse cx="-30" cy="-10" rx="18" ry="8"/>
      <ellipse cx="30" cy="-10" rx="18" ry="8"/>
      <ellipse cx="-21" cy="-29" rx="18" ry="8" transform="rotate(-45 -21 -29)"/>
      <ellipse cx="21" cy="-29" rx="18" ry="8" transform="rotate(45 21 -29)"/>
      <ellipse cx="-21" cy="9" rx="18" ry="8" transform="rotate(45 -21 9)"/>
      <ellipse cx="21" cy="9" rx="18" ry="8" transform="rotate(-45 21 9)"/>
    </g>
    <circle cx="0" cy="-10" r="14" fill="#6b4319"/>
  </g>
</svg>
